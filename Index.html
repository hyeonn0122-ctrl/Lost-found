const PICKUP_OFFICES = ["본교무실", "1학년 교무실", "2학년 교무실", "3학년 교무실"];

const EMOJIS = ["🎧", "📱", "💻", "📚", "👜", "🔑", "☂️", "🧣", "⌚", "💳", "✏️", "🎒", "기타"];
const MAX_IMAGES = 5;

function MatchBadge({ items, currentItem }) {
  const [match, setMatch] = useState(null);
  const [loading, setLoading] = useState(false);
  const checked = useRef(false);

  useEffect(() => {
    if (checked.current) return;
    checked.current = true;
    const oppositeType = currentItem.type === "lost" ? "found" : "lost";
    const candidates = items.filter(i => i.id !== currentItem.id && i.type === oppositeType && !i.resolved);
    if (candidates.length === 0) return;
    const check = async () => {
      setLoading(true);
      try {
        const blocks = [];
        (currentItem.images || []).slice(0, 2).forEach(img => {
          blocks.push({ type: "image", source: { type: "base64", media_type: img.match(/data:(.*?);/)?.[1] || "image/jpeg", data: img.split(",")[1] } });
        });
        (candidates[0].images || []).slice(0, 2).forEach(img => {
          blocks.push({ type: "image", source: { type: "base64", media_type: img.match(/data:(.*?);/)?.[1] || "image/jpeg", data: img.split(",")[1] } });
        });
        blocks.push({ type: "text", text: `다음 두 물건이 같은 물건일 가능성이 있는지 판단해줘. 사진이 있으면 사진도 참고해줘. 반드시 JSON만 반환해. {"match": true/false, "reason": "한 줄 이유"}\n\n물건A (${currentItem.type === "lost" ? "분실" : "습득"}): ${currentItem.title} - ${currentItem.description}\n물건B (${candidates[0].type === "lost" ? "분실" : "습득"}): ${candidates[0].title} - ${candidates[0].description}` });
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 200, messages: [{ role: "user", content: blocks }] }),
        });
        const data = await res.json();
        const parsed = JSON.parse((data.content?.[0]?.text || "").replace(/```json|```/g, "").trim());
        if (parsed.match) setMatch({ item: candidates[0], reason: parsed.reason });
      } catch { } finally { setLoading(false); }
    };
    check();
  }, []);

  if (loading) return <div className="match-loading"><span className="dot-pulse">AI 매칭 중</span></div>;
  if (!match) return null;
  return (
    <div className="match-badge">
      <span className="match-icon">✦</span>
      <span className="match-text">매칭 발견 · {match.item.title}</span>
      <span className="match-reason">{match.reason}</span>
    </div>
  );
}

function ImageGallery({ images, onLightbox }) {
  if (!images || images.length === 0) return null;
  if (images.length === 1) return (
    <div className="gallery-single" onClick={() => onLightbox(0)}>
      <img src={images[0]} alt="사진" />
      <span className="image-hint">클릭해서 크게 보기</span>
    </div>
  );
  return (
    <div className={`gallery-grid gallery-${Math.min(images.length, 4)}`}>
      {images.slice(0, 4).map((img, i) => (
        <div key={i} className="gallery-cell" onClick={() => onLightbox(i)}>
          <img src={img} alt={`사진 ${i + 1}`} />
          {i === 3 && images.length > 4 && <div className="gallery-more">+{images.length - 4}</div>}
        </div>
      ))}
    </div>
  );
}

function Card({ item, items, onResolve }) {

        {expanded && (
          <div className="card-detail" onClick={(e) => e.stopPropagation()}>
            <ImageGallery images={item.images} onLightbox={(i) => setLightboxIdx(i)} />
            <p className="card-desc">{item.description}</p>
            <p className="card-contact">연락처 · {item.contact}</p>
            {!item.resolved && <MatchBadge items={items} currentItem={item} />}
            {!item.resolved && <button className="resolve-btn" onClick={() => onResolve(item.id)}>찾았어요 ✓</button>}
          </div>
        )}
      </div>
      {lightboxIdx !== null && (
        <div className="lightbox" onClick={() => setLightboxIdx(null)}>
          <button className="lightbox-close" onClick={() => setLightboxIdx(null)}>✕</button>
          {item.images.length > 1 && <>
            <button className="lightbox-nav left" onClick={(e) => { e.stopPropagation(); setLightboxIdx((lightboxIdx - 1 + item.images.length) % item.images.length); }}>‹</button>
            <button className="lightbox-nav right" onClick={(e) => { e.stopPropagation(); setLightboxIdx((lightboxIdx + 1) % item.images.length); }}>›</button>
          </>}
          <img src={item.images[lightboxIdx]} alt="" onClick={(e) => e.stopPropagation()} />
          {item.images.length > 1 && (
            <div className="lightbox-dots" onClick={(e) => e.stopPropagation()}>
              {item.images.map((_, i) => <span key={i} className={`lightbox-dot${i === lightboxIdx ? " active" : ""}`} onClick={() => setLightboxIdx(i)} />)}
            </div>
          )}
        </div>
      )}
    </>
  );
}

function App() {
  const [items, setItems] = useState(SAMPLE_ITEMS);
  const [filter, setFilter] = useState("all");
  const [officeFilter, setOfficeFilter] = useState("all");
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ type: "lost", title: "", description: "", lostLocation: LOST_LOCATIONS[0], pickupOffice: PICKUP_OFFICES[0], emoji: EMOJIS[0], contact: "", images: [] });
  const fileInputRef = useRef(null);

  const filtered = items.filter(i => {
    const statusOk = filter === "all" ? !i.resolved : filter === "resolved" ? i.resolved : i.type === filter && !i.resolved;
    const officeOk = officeFilter === "all" || i.pickupOffice === officeFilter;
    return statusOk && officeOk;
  });

  const handleImageChange = (e) => {
    const files = Array.from(e.target.files || []);
    const remaining = MAX_IMAGES - form.images.length;
    const toProcess = files.slice(0, remaining);
    if (!toProcess.length) return;
    let loaded = 0;
    const newImages = [];
    toProcess.forEach((file, idx) => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        newImages[idx] = ev.target.result;
        if (++loaded === toProcess.length) setForm(f => ({ ...f, images: [...f.images, ...newImages.filter(Boolean)] }));
      };
      reader.readAsDataURL(file);
    });
    e.target.value = "";
  };

  const removeImage = (idx) => setForm(f => ({ ...f, images: f.images.filter((_, i) => i !== idx) }));
  const handleSubmit = () => {
    if (!form.title.trim() || !form.contact.trim()) return;
    setItems([{ id: Date.now(), ...form, date: new Date().toISOString().slice(0, 10), resolved: false }, ...items]);
    setShowForm(false);
    setForm({ type: "lost", title: "", description: "", lostLocation: LOST_LOCATIONS[0], pickupOffice: PICKUP_OFFICES[0], emoji: EMOJIS[0], contact: "", images: [] });
  };
  const handleResolve = (id) => setItems(items.map(i => i.id === id ? { ...i, resolved: true } : i));

  return (
    <>
      <div className="app">
        <header className="header">
          <div className="header-top">
            <div>
              <p className="header-label">Lost &amp; Found · AI Matching</p>
              <h1>분실물<br />게시판</h1>
              <p className="header-sub">AI가 비슷한 물건을 자동으로 찾아드려요</p>
            </div>
            <button className="add-btn" onClick={() => setShowForm(true)}>+ 등록하기</button>
          </div>
        </header>

        <div className="stats">
          <div className="stat"><div className="stat-num lost">{items.filter(i => i.type === "lost" && !i.resolved).length}</div><div className="stat-label">분실</div></div>
          <div className="stat"><div className="stat-num found">{items.filter(i => i.type === "found" && !i.resolved).length}</div><div className="stat-label">습득</div></div>
          <div className="stat"><div className="stat-num resolved">{items.filter(i => i.resolved).length}</div><div className="stat-label">해결됨</div></div>
        </div>

        <div className="filter-group">
          <div className="filter-group-label">상태</div>
          <div className="filters" style={{marginBottom: 8}}>
            {[["all","전체"],["lost","분실"],["found","습득"],["resolved","해결됨"]].map(([v,l]) => (
              <button key={v} className={`filter-btn${filter === v ? " active" : ""}`} onClick={() => setFilter(v)}>{l}</button>
            ))}
          </div>
        </div>
        <div className="filter-group">
          <div className="filter-group-label">교무실</div>
          <div className="filters">
            <button className={`filter-btn${officeFilter === "all" ? " active" : ""}`} onClick={() => setOfficeFilter("all")}>전체</button>
            {PICKUP_OFFICES.map(o => {
              const s = OFFICE_COLORS[o];
              const isActive = officeFilter === o;
              return <button key={o} className={`filter-btn office-btn${isActive ? " active" : ""}`} style={isActive ? {background: s.bg, color: s.color, borderColor: s.border} : {}} onClick={() => setOfficeFilter(o)}>{o}</button>;
            })}
          </div>
        </div>

        <div className="cards">
          {filtered.length === 0 ? (
            <div className="empty"><div className="empty-icon">🔍</div><p>등록된 항목이 없어요</p></div>
          ) : filtered.map(item => <Card key={item.id} item={item} items={items} onResolve={handleResolve} />)}
        </div>
      </div>

      {showForm && (
        <div className="modal-overlay" onClick={() => setShowForm(false)}>
          <div className="modal" onClick={(e) => e.stopPropagation()}>
            <h2>물건 등록</h2>
            <div className="form-row">
              <label className="form-label">유형</label>
              <div className="type-toggle">
                <button className={`type-btn${form.type === "lost" ? " active-lost" : ""}`} onClick={() => setForm({...form, type: "lost"})}>잃어버렸어요</button>
                <button className={`type-btn${form.type === "found" ? " active-found" : ""}`} onClick={() => setForm({...form, type: "found"})}>주웠어요</button>
              </div>
            </div>
            <div className="form-row">
              <label className="form-label">사진 (최대 {MAX_IMAGES}장)</label>
              <input type="file" accept="image/*" multiple ref={fileInputRef} style={{display:"none"}} onChange={handleImageChange} />
              <div className="photo-section">
                <div className="photo-previews">
                  {form.images.map((img, idx) => (
                    <div key={idx} className="photo-preview">
                      <img src={img} alt={`사진 ${idx+1}`} />
                      <button className="photo-preview-remove" onClick={() => removeImage(idx)}>✕</button>
                    </div>
                  ))}
                  {form.images.length < MAX_IMAGES && (
                    <div className="photo-add-btn" onClick={() => fileInputRef.current?.click()}>
                      <span>📷</span><span className="photo-add-label">추가</span>
                    </div>
                  )}
                </div>
                <p className="photo-hint">{form.images.length}/{MAX_IMAGES}장 · 사진이 있으면 AI 매칭이 더 정확해요</p>
              </div>
            </div>
            <div className="form-row">
              <label className="form-label">아이콘</label>
              <div className="emoji-grid">
                {EMOJIS.map(e => (
                  <button key={e} className={`emoji-btn${form.emoji === e ? " active" : ""}`} onClick={() => setForm({...form, emoji: e})}>{e === "기타" ? "···" : e}</button>
                ))}
              </div>
            </div>
            <div className="form-row">
              <label className="form-label">물건 이름 *</label>
              <input placeholder="예: 갤럭시 버즈2 프로" value={form.title} onChange={(e) => setForm({...form, title: e.target.value})} />
            </div>
            <div className="form-row">
              <label className="form-label">설명</label>
              <textarea placeholder="색상, 특징 등을 적어주세요" value={form.description} onChange={(e) => setForm({...form, description: e.target.value})} />
            </div>
            <div className="form-row">
              <label className="form-label">분실/습득 장소</label>
              <select value={form.lostLocation} onChange={(e) => setForm({...form, lostLocation: e.target.value})}>
                {LOST_LOCATIONS.map(l => <option key={l}>{l}</option>)}
              </select>
            </div>
            <div className="form-row">
              <label className="form-label">찾아가는 교무실</label>
              <div className="office-grid">
                {PICKUP_OFFICES.map(o => {
                  const s = OFFICE_COLORS[o];
                  const isActive = form.pickupOffice === o;
                  return <button key={o} className={`office-select-btn${isActive ? " active" : ""}`} style={isActive ? {background: s.bg, color: s.color, borderColor: s.border, fontWeight: 500} : {}} onClick={() => setForm({...form, pickupOffice: o})}>{o}</button>;
                })}
              </div>
            </div>
            <div className="form-row">
              <label className="form-label">연락처 (학번/이름) *</label>
              <input placeholder="예: 2학년 3반 홍길동" value={form.contact} onChange={(e) => setForm({...form, contact: e.target.value})} />
            </div>
            <div className="modal-actions">
              <button className="cancel-btn" onClick={() => setShowForm(false)}>취소</button>
              <button className="submit-btn" onClick={handleSubmit}>등록하기</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
