<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>분실물 게시판</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f2ee;--sf:#fdfcfa;--bd:#e8e2d9;--tx:#1a1814;--mu:#8a8278;--lo:#c0392b;--lb:#fdf0ee;--fo:#2c7a4b;--fb:#eef7f2;--ac:#d4a843}
body{background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--tx);min-height:100vh}
.app{max-width:680px;margin:0 auto;padding:0 16px 80px}
.hdr{padding:40px 0 28px;border-bottom:1px solid var(--bd);margin-bottom:28px;display:flex;justify-content:space-between;align-items:flex-start}
.hdr h1{font-size:30px;font-weight:700;letter-spacing:-0.02em;line-height:1.1}
.hdr p{margin-top:6px;font-size:13px;color:var(--mu)}
.abtn{background:var(--tx);color:var(--bg);border:none;border-radius:100px;padding:10px 18px;font-size:13px;cursor:pointer;white-space:nowrap;margin-top:4px;font-family:inherit}
.stats{display:flex;gap:12px;margin-bottom:20px}
.stat{flex:1;background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:14px;text-align:center}
.snum{font-size:26px;font-weight:700;line-height:1;margin-bottom:3px}
.snum.l{color:var(--lo)}.snum.f{color:var(--fo)}.snum.r{color:var(--ac)}
.slbl{font-size:11px;color:var(--mu)}
.flbl{font-size:10px;color:var(--mu);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:5px}
.fltrs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.fb{background:none;border:1px solid var(--bd);border-radius:100px;padding:5px 13px;font-size:12px;cursor:pointer;color:var(--mu);font-family:inherit}
.fb.on{background:var(--tx);color:var(--bg);border-color:var(--tx)}
.cards{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:18px;padding:18px;cursor:pointer;position:relative;overflow:hidden;transition:transform 0.15s}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.card.lost::before{background:var(--lo)}.card.found::before{background:var(--fo)}
.card.done{opacity:0.5}
.card:hover:not(.done){transform:translateY(-1px)}
.ctop{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cemoji{font-size:22px;flex-shrink:0}
.cthumb{width:44px;height:44px;border-radius:9px;overflow:hidden;flex-shrink:0;border:1px solid var(--bd);cursor:pointer;position:relative}
.cthumb img{width:100%;height:100%;object-fit:cover}
.cplus{position:absolute;bottom:2px;right:2px;background:rgba(0,0,0,0.6);color:#fff;font-size:8px;padding:1px 3px;border-radius:3px}
.tag{font-size:10px;font-weight:500;padding:3px 8px;border-radius:100px}
.tag.lost{background:var(--lb);color:var(--lo)}.tag.found{background:var(--fb);color:var(--fo)}
.cdate{font-size:11px;color:var(--mu);flex:1}
.dbadge{font-size:10px;background:#f0ebe0;color:var(--ac);padding:3px 8px;border-radius:100px}
.ctitle{font-size:15px;font-weight:500;margin-bottom:5px}
.clocs{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.cloc{font-size:12px;color:var(--mu)}
.office{font-size:11px;font-weight:500;padding:2px 8px;border-radius:100px;border:1px solid}
.detail{margin-top:14px;padding-top:14px;border-top:1px solid var(--bd)}
.cdesc{font-size:13px;line-height:1.6;margin-bottom:7px}
.ccon{font-size:12px;color:var(--mu);margin-bottom:12px}
.g1{border-radius:12px;overflow:hidden;margin-bottom:12px;cursor:pointer;max-height:220px}
.g1 img{width:100%;max-height:220px;object-fit:cover;display:block}
.gg{display:grid;gap:3px;margin-bottom:12px;border-radius:12px;overflow:hidden}
.gg.g2{grid-template-columns:1fr 1fr}
.gg.g3{grid-template-columns:1fr 1fr}
.gg.g3 .gc:first-child{grid-column:1/-1;aspect-ratio:16/6}
.gg.g4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.gc{position:relative;overflow:hidden;cursor:pointer;aspect-ratio:1}
.gc img{width:100%;height:100%;object-fit:cover;display:block}
.gcmore{position:absolute;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:700}
.match{background:linear-gradient(135deg,#fdf8ee,#fef3d0);border:1px solid #e8d5a0;border-radius:10px;padding:9px 12px;margin-bottom:10px;font-size:12px}
.mtitle{font-weight:500;color:#8a6820;margin-bottom:2px}
.mwhy{color:#a88030;font-size:11px}
.mwait{font-size:12px;color:var(--mu);margin-bottom:10px}
.rbtn{background:var(--tx);color:var(--bg);border:none;border-radius:9px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:inherit}
.lb{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;cursor:pointer}
.lb img{max-width:100%;max-height:85vh;border-radius:10px;object-fit:contain;cursor:default}
.lbx{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.15);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lbn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.15);border:none;color:#fff;width:42px;height:42px;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lbn.l{left:12px}.lbn.r{right:12px}
.lbd{position:absolute;bottom:16px;display:flex;gap:5px}
.lbdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.4);cursor:pointer}
.lbdot.on{background:#fff}
.empty{text-align:center;padding:50px 0;color:var(--mu);font-size:14px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.35);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:16px}
.modal{background:var(--sf);border-radius:22px 22px 14px 14px;padding:26px 22px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto}
.modal h2{font-size:19px;font-weight:700;margin-bottom:18px}
.frow{margin-bottom:13px}
.flabel{display:block;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--mu);margin-bottom:5px}
.tgl{display:flex;gap:7px}
.tbtn{flex:1;padding:9px;border-radius:11px;border:1px solid var(--bd);background:none;font-size:13px;cursor:pointer;color:var(--mu);font-family:inherit}
.tbtn.lon{background:var(--lb);border-color:var(--lo);color:var(--lo);font-weight:500}
.tbtn.fon{background:var(--fb);border-color:var(--fo);color:var(--fo);font-weight:500}
.ogrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.obtn{padding:9px 7px;border-radius:11px;border:1px solid var(--bd);background:none;font-size:12px;cursor:pointer;color:var(--mu);font-family:inherit;text-align:center}
.photos{display:flex;flex-wrap:wrap;gap:6px}
.pprev{width:68px;height:68px;border-radius:9px;overflow:hidden;position:relative;border:1px solid var(--bd)}
.pprev img{width:100%;height:100%;object-fit:cover}
.prm{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.55);color:#fff;border:none;width:18px;height:18px;border-radius:50%;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.padd{width:68px;height:68px;border-radius:9px;border:1.5px dashed var(--bd);background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:18px;gap:2px}
.padd span{font-size:9px;color:var(--mu)}
.phint{font-size:11px;color:var(--mu);margin-top:5px}
.erow{display:flex;flex-wrap:wrap;gap:5px}
.ebtn{width:36px;height:36px;border-radius:9px;border:1px solid var(--bd);background:none;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ebtn.on{background:var(--tx);border-color:var(--tx)}
input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:11px;padding:9px 13px;font-size:14px;font-family:inherit;color:var(--tx);outline:none}
textarea{resize:none;height:68px}
.acts{display:flex;gap:7px;margin-top:18px}
.cbtn{flex:1;padding:11px;border-radius:13px;border:1px solid var(--bd);background:none;font-size:14px;cursor:pointer;color:var(--mu);font-family:inherit}
.sbtn{flex:2;padding:11px;border-radius:13px;border:none;background:var(--tx);color:var(--bg);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div id="app"></div>
<script>
var OFFICES=["본교무실","1학년 교무실","2학년 교무실","3학년 교무실"];
var OCOL={"본교무실":{bg:"#f0f0ff",c:"#4444cc",b:"#c8c8ee"},"1학년 교무실":{bg:"#fff0f5",c:"#cc3366",b:"#eec8d5"},"2학년 교무실":{bg:"#f0fff4",c:"#2c7a4b",b:"#c8eeda"},"3학년 교무실":{bg:"#fff8f0",c:"#cc6622",b:"#eeddc8"}};
var LOCS=["1층 현관","2층 복도","3층 도서관","급식실 앞","체육관","운동장","화장실 앞","기타"];
var EMOJIS=["🎧","📱","💻","📚","👜","🔑","☂️","🧣","⌚","💳","✏️","🎒"];
var MAX_IMG=5;
var items=[
{id:1,type:"lost",title:"갤럭시 버즈2 프로",desc:"검정색 케이스, 오른쪽에 작은 스크래치 있음",loc:"3층 도서관",office:"2학년 교무실",date:"2025-05-09",contact:"2학년 3반 김민준",emoji:"🎧",imgs:[],done:false},
{id:2,type:"found",title:"흰색 이어폰 케이스",desc:"무선 이어폰 케이스인데 내용물 없음, 긁힌 자국 있음",loc:"급식실 앞",office:"본교무실",date:"2025-05-09",contact:"2학년 1반 박서연",emoji:"🎧",imgs:[],done:false},
{id:3,type:"lost",title:"수학 문제집",desc:"수능특강 수학, 이름 적혀있음 (이지훈)",loc:"2층 복도",office:"2학년 교무실",date:"2025-05-08",contact:"2학년 5반 이지훈",emoji:"📚",imgs:[],done:false},
{id:4,type:"found",title:"우산",desc:"네이비 체크무늬 장우산, 손잡이 나무",loc:"1층 현관",office:"1학년 교무실",date:"2025-05-07",contact:"2학년 2반 최유나",emoji:"☂️",imgs:[],done:true}
];
var filter="all",officeFilter="all",showForm=false,expandedId=null,lbox=null;
var form={type:"lost",title:"",desc:"",loc:LOCS[0],office:OFFICES[0],emoji:EMOJIS[0],contact:"",imgs:[]};
var matches={};

function render(){
var app=document.getElementById(“app”);
var filtered=items.filter(function(i){
var sok=filter===“all”?!i.done:filter===“done”?i.done:i.type===filter&&!i.done;
var ook=officeFilter===“all”||i.office===officeFilter;
return sok&&ook;
});
var html=’<div class="app"><div class="hdr"><div>’;
html+=’<p style="font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--mu);margin-bottom:6px">Lost & Found · AI Matching</p>’;
html+=’<h1>분실물<br>게시판</h1><p>AI가 비슷한 물건을 자동으로 찾아드려요</p></div>’;
html+=’<button class="abtn" onclick="openForm()">+ 등록하기</button></div>’;
html+=’<div class="stats">’;
html+=’<div class="stat"><div class="snum l">’+items.filter(function(i){return i.type===“lost”&&!i.done}).length+’</div><div class="slbl">분실</div></div>’;
html+=’<div class="stat"><div class="snum f">’+items.filter(function(i){return i.type===“found”&&!i.done}).length+’</div><div class="slbl">습득</div></div>’;
html+=’<div class="stat"><div class="snum r">’+items.filter(function(i){return i.done}).length+’</div><div class="slbl">해결됨</div></div>’;
html+=’</div>’;
html+=’<div class="flbl">상태</div><div class="fltrs">’;
[[“all”,“전체”],[“lost”,“분실”],[“found”,“습득”],[“done”,“해결됨”]].forEach(function(x){
html+=’<button class=“fb’+(filter===x[0]?” on”:””)+’” onclick=“setFilter('’+x[0]+’')”>’+x[1]+’</button>’;
});
html+=’</div><div class="flbl">교무실</div><div class="fltrs">’;
html+=’<button class=“fb’+(officeFilter===“all”?” on”:””)+’” onclick=“setOffice('all')”>전체</button>’;
OFFICES.forEach(function(o){
var s=OCOL[o];var on=officeFilter===o;
html+=’<button class=“fb’+(on?” on”:””)+’” style=”’+(on?“background:”+s.bg+”;color:”+s.c+”;border-color:”+s.b+”;”:””)+’” onclick=“setOffice('’+o+’')”>’+o+’</button>’;
});
html+=’</div><div class="cards">’;
if(filtered.length===0){html+=’<div class="empty">🔍<br>등록된 항목이 없어요</div>’;}
else{filtered.forEach(function(item){html+=renderCard(item);});}
html+=’</div></div>’;
if(showForm)html+=renderForm();
if(lbox)html+=renderLightbox();
app.innerHTML=html;
}

function renderCard(item){
var exp=expandedId===item.id;
var os=OCOL[item.office]||{};
var hasImg=item.imgs&&item.imgs.length>0;
var h=’<div class=“card ‘+item.type+(item.done?” done”:””)+’” onclick=“toggleCard(’+item.id+’)”>’;
h+=’<div class="ctop">’;
if(hasImg){
h+=’<div class="cthumb" onclick="event.stopPropagation();openLb('+item.id+',0)"><img src="'+item.imgs[0]+'">’;
if(item.imgs.length>1)h+=’<span class="cplus">+’+( item.imgs.length-1)+’</span>’;
h+=’</div>’;
}else{h+=’<span class="cemoji">’+item.emoji+’</span>’;}
h+=’<span class="tag '+item.type+'">’+(item.type===“lost”?“분실”:“습득”)+’</span>’;
h+=’<span class="cdate">’+item.date+’</span>’;
if(item.done)h+=’<span class="dbadge">해결됨</span>’;
h+=’</div><div class="ctitle">’+item.title+’</div>’;
h+=’<div class="clocs"><span class="cloc">📍 ‘+item.loc+’</span>’;
h+=’<span class="office" style="background:'+os.bg+';color:'+os.c+';border-color:'+os.b+'">🏫 ‘+item.office+’</span></div>’;
if(exp){
h+=’<div class="detail" onclick="event.stopPropagation()">’;
h+=renderGallery(item);
h+=’<div class="cdesc">’+item.desc+’</div>’;
h+=’<div class="ccon">연락처 · ‘+item.contact+’</div>’;
if(!item.done)h+=renderMatch(item);
if(!item.done)h+=’<button class="rbtn" onclick="resolve('+item.id+')">찾았어요 ✓</button>’;
h+=’</div>’;
}
h+=’</div>’;
return h;
}

function renderGallery(item){
if(!item.imgs||item.imgs.length===0)return””;
if(item.imgs.length===1)return’<div class="g1" onclick="openLb('+item.id+',0)"><img src="'+item.imgs[0]+'"></div>’;
var n=Math.min(item.imgs.length,4);
var h=’<div class="gg g'+n+'">’;
item.imgs.slice(0,4).forEach(function(img,i){
h+=’<div class="gc" onclick="openLb('+item.id+','+i+')"><img src="'+img+'">’;
if(i===3&&item.imgs.length>4)h+=’<div class="gcmore">+’+(item.imgs.length-4)+’</div>’;
h+=’</div>’;
});
h+=’</div>’;
return h;
}

function renderMatch(item){
var m=matches[item.id];
if(m===undefined){checkMatch(item);return’<div class="mwait">AI 매칭 중…</div>’;}
if(!m)return””;
return’<div class="match"><div class="mtitle">✦ 매칭 발견 · ‘+m.title+’</div><div class="mwhy">’+m.reason+’</div></div>’;
}

function checkMatch(item){
var opp=item.type===“lost”?“found”:“lost”;
var cands=items.filter(function(i){return i.id!==item.id&&i.type===opp&&!i.done;});
if(!cands.length){matches[item.id]=null;render();return;}
var c=cands[0];
var blocks=[];
(item.imgs||[]).slice(0,1).forEach(function(img){
blocks.push({type:“image”,source:{type:“base64”,media_type:img.match(/data:(.*?);/)[1]||“image/jpeg”,data:img.split(”,”)[1]}});
});
(c.imgs||[]).slice(0,1).forEach(function(img){
blocks.push({type:“image”,source:{type:“base64”,media_type:img.match(/data:(.*?);/)[1]||“image/jpeg”,data:img.split(”,”)[1]}});
});
blocks.push({type:“text”,text:“두 물건이 같은 것일 가능성이 있는지 판단해. 반드시 JSON만: {"match":true/false,"reason":"한줄이유"}\n물건A(”+(item.type===“lost”?“분실”:“습득”)+”):”+item.title+” “+item.desc+”\n물건B(”+(c.type===“lost”?“분실”:“습득”)+”):”+c.title+” “+c.desc});
fetch(“https://api.anthropic.com/v1/messages”,{method:“POST”,headers:{“Content-Type”:“application/json”},body:JSON.stringify({model:“claude-sonnet-4-20250514”,max_tokens:150,messages:[{role:“user”,content:blocks}]})})
.then(function(r){return r.json();})
.then(function(data){
var txt=(data.content&&data.content[0]&&data.content[0].text)||”{}”;
txt=txt.replace(/`json|`/g,””).trim();
var parsed=JSON.parse(txt);
matches[item.id]=parsed.match?{title:c.title,reason:parsed.reason}:null;
render();
})
.catch(function(){matches[item.id]=null;render();});
}

function renderLightbox(){
var item=items.filter(function(i){return i.id===lbox.itemId;})[0];
if(!item||!item.imgs[lbox.idx])return””;
var h=’<div class="lb" onclick="closeLb()"><button class="lbx" onclick="closeLb()">✕</button>’;
if(item.imgs.length>1){
h+=’<button class="lbn l" onclick="event.stopPropagation();lbNav(-1)">‹</button>’;
h+=’<button class="lbn r" onclick="event.stopPropagation();lbNav(1)">›</button>’;
}
h+=’<img src="'+item.imgs[lbox.idx]+'" onclick="event.stopPropagation()">’;
if(item.imgs.length>1){
h+=’<div class="lbd">’;
item.imgs.forEach(function(_,i){h+=’<div class=“lbdot’+(i===lbox.idx?” on”:””)+’” onclick=“event.stopPropagation();setLbIdx(’+i+’)”></div>’;});
h+=’</div>’;
}
h+=’</div>’;
return h;
}

function renderForm(){
var os=OCOL[form.office]||{};
var h=’<div class="ov" onclick="closeForm()"><div class="modal" onclick="event.stopPropagation()">’;
h+=’<h2>물건 등록</h2>’;
h+=’<div class="frow"><label class="flabel">유형</label><div class="tgl">’;
h+=’<button class=“tbtn’+(form.type===“lost”?” lon”:””)+’” onclick=“setFType('lost')”>잃어버렸어요</button>’;
h+=’<button class=“tbtn’+(form.type===“found”?” fon”:””)+’” onclick=“setFType('found')”>주웠어요</button>’;
h+=’</div></div>’;
h+=’<div class="frow"><label class="flabel">사진 (최대’+MAX_IMG+‘장)</label>’;
h+=’<input type="file" id="fi" accept="image/*" multiple style="display:none" onchange="handleFiles(this)">’;
h+=’<div class="photos">’;
form.imgs.forEach(function(img,i){
h+=’<div class="pprev"><img src="'+img+'"><button class="prm" onclick="rmImg('+i+')">✕</button></div>’;
});
if(form.imgs.length<MAX_IMG)h+=’<div class="padd" onclick="document.getElementById(\'fi\').click()"><span>📷</span><span>추가</span></div>’;
h+=’</div><div class="phint">’+form.imgs.length+’/’+MAX_IMG+‘장</div></div>’;
h+=’<div class="frow"><label class="flabel">아이콘</label><div class="erow">’;
EMOJIS.forEach(function(e){h+=’<button class=“ebtn’+(form.emoji===e?” on”:””)+’” onclick=“setEmoji('’+e+’')”>’+e+’</button>’;});
h+=’</div></div>’;
h+=’<div class="frow"><label class="flabel">물건 이름 *</label><input placeholder="예: 갤럭시 버즈2 프로" value="'+form.title+'" oninput="form.title=this.value"></div>’;
h+=’<div class="frow"><label class="flabel">설명</label><textarea placeholder="색상, 특징 등" oninput="form.desc=this.value">’+form.desc+’</textarea></div>’;
h+=’<div class="frow"><label class="flabel">분실/습득 장소</label><select onchange="form.loc=this.value">’;
LOCS.forEach(function(l){h+=’<option’+(form.loc===l?” selected”:””)+’>’+l+’</option>’;});
h+=’</select></div>’;
h+=’<div class="frow"><label class="flabel">찾아가는 교무실</label><div class="ogrid">’;
OFFICES.forEach(function(o){
var s=OCOL[o];var on=form.office===o;
h+=’<button class=“obtn” style=”’+(on?“background:”+s.bg+”;color:”+s.c+”;border-color:”+s.b+”;font-weight:500”:””)+’” onclick=“setFOffice('’+o+’')”>’+o+’</button>’;
});
h+=’</div></div>’;
h+=’<div class="frow"><label class="flabel">연락처 *</label><input placeholder="예: 2학년 3반 홍길동" value="'+form.contact+'" oninput="form.contact=this.value"></div>’;
h+=’<div class="acts"><button class="cbtn" onclick="closeForm()">취소</button><button class="sbtn" onclick="submitForm()">등록하기</button></div>’;
h+=’</div></div>’;
return h;
}

function toggleCard(id){expandedId=expandedId===id?null:id;render();}
function setFilter(v){filter=v;render();}
function setOffice(v){officeFilter=v;render();}
function resolve(id){items=items.map(function(i){return i.id===id?Object.assign({},i,{done:true}):i;});render();}
function openForm(){showForm=true;render();}
function closeForm(){showForm=false;render();}
function setFType(t){form.type=t;render();}
function setEmoji(e){form.emoji=e;render();}
function setFOffice(o){form.office=o;render();}
function rmImg(i){form.imgs=form.imgs.filter(function(_,j){return j!==i;});render();}
function openLb(itemId,idx){lbox={itemId:itemId,idx:idx};render();}
function closeLb(){lbox=null;render();}
function lbNav(d){var item=items.filter(function(i){return i.id===lbox.itemId;})[0];if(!item)return;lbox.idx=(lbox.idx+d+item.imgs.length)%item.imgs.length;render();}
function setLbIdx(i){lbox.idx=i;render();}

function handleFiles(input){
var files=Array.from(input.files||[]);
var rem=MAX_IMG-form.imgs.length;
var toLoad=files.slice(0,rem);
if(!toLoad.length)return;
var done=0;var newImgs=[];
toLoad.forEach(function(f,i){
var r=new FileReader();
r.onload=function(e){
newImgs[i]=e.target.result;
done++;
if(done===toLoad.length){
newImgs.forEach(function(img){if(img)form.imgs.push(img);});
render();
}
};
r.readAsDataURL(f);
});
input.value=””;
}

function submitForm(){
if(!form.title.trim()||!form.contact.trim())return;
var newItem={id:Date.now(),type:form.type,title:form.title,desc:form.desc,loc:form.loc,office:form.office,emoji:form.emoji,contact:form.contact,imgs:form.imgs.slice(),date:new Date().toISOString().slice(0,10),done:false};
items=[newItem].concat(items);
showForm=false;
form={type:“lost”,title:””,desc:””,loc:LOCS[0],office:OFFICES[0],emoji:EMOJIS[0],contact:””,imgs:[]};
render();
}

render();
</script>
